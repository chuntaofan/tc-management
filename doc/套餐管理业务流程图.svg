<svg xmlns="http://www.w3.org/2000/svg" width="840" height="840" viewBox="0 0 840 840">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
  <rect width="840" height="840" fill="#ffffff"/>
  <style>
    .shape { fill: #f6ffed; stroke: #389e0d; stroke-width: 1.5; }
    .diamond { fill: #fffbe6; stroke: #d48806; stroke-width: 1.5; }
    .startend { fill: #e6f7ff; stroke: #1890ff; stroke-width: 1.5; }
    text { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 13px; fill: #262626; text-anchor: middle; dominant-baseline: middle; }
    .label { font-size: 12px; fill: #595959; }
  </style>

  <ellipse cx="300" cy="40" rx="50.0" ry="20.0" class="startend"/>
  <text x="300" y="40">开始</text>
  <rect x="220.0" y="96.0" width="160" height="48" rx="4" class="shape"/>
