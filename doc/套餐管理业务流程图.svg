  <line x1="520.0" y1="344.0" x2="520.0" y2="380.0" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="520.0" y1="420.0" x2="520.0" y2="448.0" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="580.0" y1="480.0" x2="640.0" y2="480.0" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="610.0" y="472.0" class="label">未来</text>
  <line x1="520.0" y1="512.0" x2="520.0" y2="540.0" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="520.0" y="518.0" class="label">当前/过去</text>
  <line x1="660.0" y1="500.0" x2="340.0" y2="660.0" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="483.3" y1="580.0" x2="336.7" y2="660.0" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="120.0" y1="344.0" x2="120.0" y2="380.0" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="132.9" y1="420.0" x2="287.1" y2="660.0" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300.0" y1="540.0" x2="300.0" y2="580.0" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300.0" y1="620.0" x2="300.0" y2="660.0" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300.0" y1="700.0" x2="300.0" y2="740.0" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>