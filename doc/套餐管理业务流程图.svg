  <line x1="300.0" y1="224.0" x2="300.0" y2="256.0" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300.0" y1="304.0" x2="300.0" y2="344.0" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="341.2" y1="368.8" x2="450.0" y2="339.1" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="395.6" y="345.9" class="label">新增/编辑/复制</text>
  <line x1="261.4" y1="367.1" x2="180.0" y2="340.0" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
