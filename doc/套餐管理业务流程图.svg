  <rect x="450.0" y="296.0" width="140" height="48" rx="4" class="shape"/>
  <text x="520" y="311">新增/编辑/复制</text>
  <text x="520" y="329">弹窗填写</text>
  <rect x="460.0" y="380.0" width="120" height="40" rx="4" class="shape"/>
