  <rect x="640.0" y="460.0" width="120" height="40" rx="4" class="shape"/>
  <text x="700" y="471">生成待上架</text>
  <text x="700" y="489">(需替换对象)</text>
  <rect x="460.0" y="540.0" width="120" height="40" rx="4" class="shape"/>
