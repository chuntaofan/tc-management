  <rect x="240.0" y="500.0" width="120" height="40" rx="4" class="shape"/>
  <text x="300" y="520">确认删除</text>
  <rect x="240.0" y="580.0" width="120" height="40" rx="4" class="shape"/>
  <text x="300" y="600">删除记录</text>
  <rect x="240.0" y="660.0" width="120" height="40" rx="4" class="shape"/>
