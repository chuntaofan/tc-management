  <rect x="210.0" y="176.0" width="180" height="48" rx="4" class="shape"/>
  <text x="300" y="191">生命周期同步</text>
  <text x="300" y="209">(pending→active，替换旧版)</text>
  <rect x="220.0" y="256.0" width="160" height="48" rx="4" class="shape"/>
